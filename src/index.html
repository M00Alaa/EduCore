<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <title>EduCore — Course Management System</title>
    <base href="/" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <meta
      name="description"
      content="EduCore is a modern course management system built with Angular 19. Manage courses, instructors, and students with a clean and responsive interface."
    />
    <meta
      name="keywords"
      content="EduCore, course management, education platform, Angular, learning management system, LMS, course dashboard"
    />
    <!-- Open Graph -->
    <meta property="og:title" content="EduCore — Course Management System" />
    <meta
      property="og:description"
      content="A modern course management platform built with Angular 19."
    />
    <meta property="og:type" content="website" />
    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link href="favicon.ico" rel="apple-touch-icon" />
    <style>
      #loader_wrapper {
        position: fixed;
        background-color: #f5f5f5;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 99999;
      }

      .loader {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        display: inline-block;
        border-top: 4px solid #4f7cff;
        border-right: 4px solid transparent;
        box-sizing: border-box;
        animation: rotation 1s linear infinite;
      }

      .loader::after {
        content: '';
        box-sizing: border-box;
        position: absolute;
        left: 0;
        top: 0;
        width: 48px;
        height: 48px;
        border-radius: 50%;
        border-bottom: 4px solid #f19731;
        border-left: 4px solid transparent;
      }

      @keyframes rotation {
        0% {
          transform: rotate(0deg);
        }

        100% {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>

  <body>
    <app-root>
      <div id="loader_wrapper">
        <span class="loader"></span>
      </div>
    </app-root>
  </body>
</html>
