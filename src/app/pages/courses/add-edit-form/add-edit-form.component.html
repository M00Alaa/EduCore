<div class="container-fluid">
  <div class="row">
    <div class="col-12">
      <div class="card shadow-none border rounded-3">
        <div class="card-header border-bottom bg-white p-3">
          <div class="d-flex align-items-center justify-content-between">
            <h4 class="card-title mb-0">
              <button
                class="btn btn-icon me-2"
                (click)="onCancel()"
                nz-tooltip
                nzTooltipTitle="Back to courses"
              >
                <i class="bx bx-arrow-back"></i>
              </button>
              {{ isEditMode ? 'Edit Course' : 'Add New Course' }}
            </h4>
          </div>
        </div>

        <div class="card-body p-3">
          <div
            *ngIf="loading"
            class="d-flex justify-content-center align-items-center min-h-300"
          >
            <nz-spin nzTip="Loading..."></nz-spin>
          </div>

          <form
            *ngIf="!loading"
            nz-form
            [formGroup]="courseForm"
            (ngSubmit)="onSubmit()"
            class="row custom_form g-3 row-cols-1 row-cols-md-2"
          >
            <nz-form-item class="w-100">
              <nz-form-label
                [nzRequired]="
                  courseName?.invalid &&
                  (courseName?.dirty || courseName?.touched)
                "
              >
                Course Name
              </nz-form-label>
              <nz-form-control [nzErrorTip]="nzErrorTip">
                <input
                  nz-input
                  formControlName="courseName"
                  placeholder="Enter course name"
                  class="h-50px"
                />
              </nz-form-control>
            </nz-form-item>

            <nz-form-item>
              <nz-form-label
                [nzRequired]="
                  instructorName?.invalid &&
                  (instructorName?.dirty || instructorName?.touched)
                "
              >
                Instructor Name
              </nz-form-label>
              <nz-form-control [nzErrorTip]="nzErrorTip">
                <input
                  nz-input
                  formControlName="instructorName"
                  placeholder="Enter instructor name"
                  class="h-50px"
                />
              </nz-form-control>
            </nz-form-item>

            <nz-form-item>
              <nz-form-label
                [nzRequired]="
                  category?.invalid && (category?.dirty || category?.touched)
                "
              >
                Category
              </nz-form-label>
              <nz-form-control [nzErrorTip]="nzErrorTip">
                <nz-select
                  formControlName="category"
                  nzPlaceHolder="Select category"
                  class="h-50px"
                >
                  <nz-option
                    *ngFor="let category of categoryOptions"
                    [nzValue]="category"
                    [nzLabel]="category"
                  ></nz-option>
                </nz-select>
              </nz-form-control>
            </nz-form-item>

            <nz-form-item>
              <nz-form-label
                [nzRequired]="
                  status?.invalid && (status?.dirty || status?.touched)
                "
              >
                Status
              </nz-form-label>
              <nz-form-control [nzErrorTip]="nzErrorTip">
                <nz-select
                  formControlName="status"
                  nzPlaceHolder="Select status"
                  class="h-50px"
                >
                  <nz-option
                    *ngFor="let status of statusOptions"
                    [nzValue]="status"
                    [nzLabel]="status"
                  ></nz-option>
                </nz-select>
              </nz-form-control>
            </nz-form-item>

            <nz-form-item>
              <nz-form-label
                [nzRequired]="
                  duration?.invalid && (duration?.dirty || duration?.touched)
                "
              >
                Duration (Hours)
              </nz-form-label>
              <nz-form-control [nzErrorTip]="nzErrorTip">
                <input
                  nz-input
                  type="number"
                  formControlName="duration"
                  placeholder="Enter duration"
                  class="h-50px"
                />
              </nz-form-control>
            </nz-form-item>

            <nz-form-item>
              <nz-form-label
                [nzRequired]="
                  price?.invalid && (price?.dirty || price?.touched)
                "
              >
                Price
              </nz-form-label>
              <nz-form-control [nzErrorTip]="nzErrorTip">
                <input
                  nz-input
                  type="number"
                  formControlName="price"
                  placeholder="Enter price"
                  class="h-50px"
                />
              </nz-form-control>
            </nz-form-item>

            <nz-form-item class="w-100">
              <nz-form-label> Description </nz-form-label>
              <nz-form-control [nzErrorTip]="nzErrorTip">
                <textarea
                  nz-input
                  formControlName="description"
                  rows="4"
                  placeholder="Enter course description (optional)"
                ></textarea>
                <span class="text-muted fs-14px"
                  >{{ description?.value?.length || 0 }}/500 characters</span
                >
              </nz-form-control>
            </nz-form-item>

            <div class="col-12">
              <div class="d-flex justify-content-end gap-3 mt-3">
                <button nz-button nzType="default" (click)="onCancel()">
                  Cancel
                </button>
                <button
                  nz-button
                  nzType="primary"
                  type="submit"
                  [nzLoading]="submitting"
                >
                  {{ isEditMode ? 'Update' : 'Create' }} Course
                </button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<ng-template #nzErrorTip let-control>
  <app-nz-control-error-temp [control]="control"></app-nz-control-error-temp>
</ng-template>
