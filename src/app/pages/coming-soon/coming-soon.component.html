<div
  class="d-flex align-items-center justify-content-center h-100 position-relative overflow-hidden text-center"
>
  <!-- Decorative background -->
  <div
    class="position-absolute rounded-circle"
    style="
      width: 600px;
      height: 600px;
      background: radial-gradient(
        circle,
        rgba(79, 124, 255, 0.04) 0%,
        transparent 70%
      );
      top: -200px;
      right: -150px;
      pointer-events: none;
    "
  ></div>
  <div
    class="position-absolute rounded-circle"
    style="
      width: 450px;
      height: 450px;
      background: radial-gradient(
        circle,
        rgba(73, 182, 255, 0.04) 0%,
        transparent 70%
      );
      bottom: -150px;
      left: -100px;
      pointer-events: none;
    "
  ></div>

  <div class="position-relative max-w-500px">
    <!-- Illustration -->
    <div class="">
      <img
        [src]="pageContent.icon"
        class="w-200px w-md-400px"
        [alt]="pageContent.titleKey | translate"
      />
    </div>

    <!-- Title -->
    <h4 class="fw-medium mb-0">
      {{ pageContent.titleKey | translate }}
    </h4>

    <!-- <hr class="my-4" /> -->

    <div class="mt-4 border p-4">
      <!-- Quote -->
      <p class="text-gray-600 fst-italic mb-2 fs-0_875rem">
        {{ 'COMING_SOON.QUOTE' | translate }}
      </p>

      <!-- Easter egg -->
      <div class="">
        <span class="text-gray-600" style="font-size: 0.75rem; opacity: 0.5">
          {{ 'COMING_SOON.COFFEE' | translate }}
          <span *ngFor="let _ of coffeeCups">☕</span>
        </span>
      </div>
    </div>
  </div>
</div>
