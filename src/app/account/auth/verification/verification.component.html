<img [src]="logo" alt="Vult Logo" height="50" class="d-block mx-auto" />

<!-- <h2 class="text-center fw-bold my-4">التحقق من البريد الإلكتروني</h2> -->
<p class="text-center fw-medium my-5">
  {{ 'AUTH_VERIFICATION.SENT_CODE' | translate: { phone: phoneNumber } }}
</p>

<div class="mx-auto" style="max-width: 500px">
  <div class="d-flex justify-content-center otp-container">
    <ng-otp-input
      (onInputChange)="onOtpChange($event)"
      [config]="{
        length: 4,
        allowNumbersOnly: true,
        inputStyles: {
          width: '50px',
          height: '50px',
          'border-radius': '8px',
          border: '1px solid #9DA4AE',
          'text-align': 'center',
          'font-size': '20px',
          'font-weight': 'bold',
          margin: '0 8px',
        },
        containerStyles: {
          display: 'flex',
          'justify-content': 'center',
        },
      }"
    >
    </ng-otp-input>
  </div>

  <button
    (click)="verifyOtp()"
    class="col-12 btn btn-primary-gradient fw-medium h-50px mt-5"
  >
    {{ 'LOGIN.LOGIN_BUTTON' | translate }}
  </button>

  <div class="mt-4 text-center">
    <p class="mb-0">
      <span class="text-gray-600"
        >{{ 'AUTH_VERIFICATION.NO_CODE_RECEIVED' | translate }}
      </span>
      <button
        [disabled]="$timer !== 0"
        (click)="sendAgain()"
        class="btn btn-link text-gray-600 p-0 ms-1"
        style="text-decoration: none"
      >
        <span *ngIf="$timer === 0">{{
          'AUTH_VERIFICATION.RESEND' | translate
        }}</span>
        <span *ngIf="$timer > 0"
          >{{ 'AUTH_VERIFICATION.RESEND_IN' | translate }}
          <span class="text-primary">{{ $timer }}</span>
          {{ 'AUTH_VERIFICATION.SECONDS' | translate }}</span
        >
      </button>
    </p>
  </div>
</div>
