<ng-select  appendTo="body"  [readonly]="disabled" [loading]="loading" [ngClass]="classes" [placeholder]="placeholder"
    [(ngModel)]="value" [ngModelOptions]="{standalone: true}" (ngModelChange)="onChange($event)">
    @for (option of spareParts; track $index;) {
    <ng-option [disabled]="!option?.id || skipIds.includes(option?.id!)" [value]="option.id">
        <div class="d-flex gap-1 align-items-center">
            <div class="d-flex flex-wrap gap-1 align-items-center">
                <span class="d-inline-block">
                    {{option.name}}
                </span>
                <small class="d-inline-flex gap-1">
                    @if (option.codeNumber) {
                    ({{option.codeNumber}})
                    }
                    <span [class]="option.instancesInStockCount! > 0 ? 'text-success' :'text-danger'">
                        متوفر:
                        {{option.instancesInStockCount}}
                    </span>
                </small>
            </div>
        </div>
    </ng-option>
    }
</ng-select>
